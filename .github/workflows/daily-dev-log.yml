name: Daily Dev Log

on:
  schedule:
    # Runs daily at 14:15 UTC. Change this to your preferred time.
    - cron: "15 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update daily dev log
        run: python scripts/update_dev_log.py

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logs README.md scripts .github/workflows
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "docs: update daily dev log $(date -u +%F)"
          git push
